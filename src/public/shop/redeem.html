<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeeming Item...</title>
    <script>
        async function redeemItem() {
            const urlParams = new URLSearchParams(window.location.search);
            const inventoryId = urlParams.get("inventoryId");

            console.log("Redeeming item with inventory ID: " + inventoryId);

            if (!inventoryId) {
                alert("Invalid QR code.");
                return;
            }

            const response = await fetch("/shop/inventory/redeem", {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${localStorage.getItem("token")}`
                },
                body: JSON.stringify({ inventoryId })
            });


            const result = await response.json();

            if (result.success) {
                alert("Item redeemed successfully!");
                window.location.href = "/shop/inventory.html";
            } else {
                alert("Redemption failed: " + result.message);
                window.location.href = "/shop/inventory.html";
            }
        }

        window.onload = redeemItem;
    </script>
</head>

<body>
    <h1>Processing Redemption...</h1>
</body>

</html>
