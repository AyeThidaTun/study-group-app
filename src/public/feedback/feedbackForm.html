<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1,
        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
            border-radius: 5px;
        }

        img {
            width: 40%;
            height: 50%;
            border-radius: 30px;
        }

        .form-control,
        .radio-group {
            max-width: 50%;
            margin: 0 auto;
        }

        .radio-group label {
            margin-right: 20px;
        }

        .form-label {
            font-weight: bold;
        }

        .form-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
        border-radius: 12px;
        padding: 15px;
        background-color: #f8f9fa;
        }

        .radio-group label {
        font-size: 1rem;
        cursor: pointer;
        }

        #feedbackForm {
        max-width: 600px;
        margin: auto;
        }

        .card {
        padding: 10px;
        background: #f8f9fa;
        }

       
        .radio-group label {
        margin: 0 5px;
        }

        .bi {
        color: #007bff;
        }
        
        .form-group {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .ratingLabel{
            margin-right: 50px;
        }

    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <div class="container">
        <div class="text-center my-4">
            <h3>Feedback Form</h3>
        </div>
        <form id="feedbackForm">
            <div class="form-section">
                <label for="groupName" class="form-label" id="groupName">You are giving feedback for:</label>
            </div>
            <div id="feedbackSections">
            <!-- Dynamically filled feedback sections -->
            </div>
                      
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="feedbackForm.js"></script>
    <script>
        // Function to load the navbar into the page
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

        });
    </script>
</body>

</html>
