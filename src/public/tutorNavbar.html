<head>
    <base href="/" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        .navbar {
            padding-top: 1.25rem;
            padding-bottom: 1.25rem;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .logout-btn {
            background-color: #faedcd;
            border-radius: 5px;
            color: black;
            padding: 0.5rem 1rem;
            text-align: center;
            font-weight: bold;
        }

        .logout-btn:hover {
            background-color: #ccd5ae;
            color: white;
        }

        .navbar-nav .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* Dropdown menu styling */
        .dropdown-menu {
            background-color: #fefae0;
            border-radius: 10px;
            overflow: hidden;
            padding: 0;
        }

        .dropdown-menu::after {
            content: "";
            display: block;
            height: 8px;
            background-color: #d4a373;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .dropdown-item {
            color: black;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .dropdown-item:hover {
            background-color: #e9edc9;
            color: black;
        }

        /* Increase space between navbar items */
        .navbar-nav .nav-item {
            margin-right: 1.5rem;
        }

        .notification-btn img {
            transition: transform 0.2s;
        }

        .notification-btn img:hover {
            transform: scale(1.1);
            /* Slight zoom-in effect on hover */
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #d4a373;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Project Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <!-- Homepage -->
                    <li class="nav-item">
                        <a class="nav-link active" href="/tutorMatch/tuteeInfo.html">Tutees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/tutorMatch/tutorSlot.html">Manage-Slots</a>
                    </li>
     


                </ul>
                <ul class="navbar-nav ms-auto">
                    <!-- Dark Mode Toggle Button -->
                <li class="nav-item">
                    <button id="dark-mode-toggle" class="btn btn-outline-dark">Dark Mode</button>
                </li>
                    <li class="nav-item">
                        <!-- Profile button -->
                        <a class="nav-link active" href="/profile/profile.html">Profile</a>
                    </li>
                    <!-- Logout button -->
                    <li class="nav-item">
                        <a class="nav-link logout-btn" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script> // Initialize Bootstrap tooltips
        document.addEventListener('DOMContentLoaded', function () {
            const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
            tooltipTriggerList.forEach(function (tooltipTriggerEl) {
                new bootstrap.Tooltip(tooltipTriggerEl);
            });
        });
    </script>
</body>
