<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Study Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1,
        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .card {
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
        }

        .form-control {
            max-width: 500px;
            /* Set a fixed maximum width */
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            padding-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <div class="container">
        <div id="bookingNotification"
            style="display:none; position: fixed; left: 50%; transform: translateX(-50%); background-color: #f0d8da; color: #000000; padding: 20px; border-radius: 5px; font-size: 15px; font-weight: bold;  z-index: 1000;">
            Room successfully reserved! Please confirm your booking within 30 minutes.
            <a href="../booking/bookedStudyRooms.html">Confirm booking here</a>
        </div>
        <h2 class="text-center mt-5">Study Room Booking</h2>
        <button class="btn btn-custom mt-3 mb-5" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back to
            Calendar</button>
        <div id="bookingDetails">
            <!-- Booking details will be populated here -->
        </div>
        <div id="studyGroupContainer" class="row g-3 mt-4 m-3 mb-5"></div>
        <!-- Joined study groups will be dynamically added here -->
        <!-- Confirmation Modal -->
        <div id="confirmationModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Reservation Confirmation</h5>
                    <button class="close-btn" onclick="closeConfirmationModal()">x</button>
                </div>
                <p id="confirmationText" class="m-3"></p>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeConfirmationModal()">Cancel</button>
                    <button class="btn btn-custom" id="confirmBookingBtn">Confirm</button>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="studyRoomBooking.js"></script>
        <script>
            // Back button functionality
            function goBack() {
                window.history.back();
            }
            // Function to load the navbar into the page
            document.addEventListener('DOMContentLoaded', () => {
                fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

            });

        </script>
</body>

</html>
