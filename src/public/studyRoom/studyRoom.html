<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Rooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1,
        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
            border-radius: 5px;
        }

        a {
            color: black;
        }

        .container {
            margin-top: 30px;
        }

        /* Table specific styles */
        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }

        .room-table th {
            background-color: #deb183;
            text-align: center;
        }

        .room-table td {
            text-align: center;
        }

        .back-button {
            text-decoration: none;
            font-weight: bold;
            color: #deb183;
        }

        .back-button:hover {
            text-decoration: underline;
        }

        .filter-container{
            width: 20%;
        }
    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <div class="container">
        <h2 class="m-5">Available Study Rooms</h2>
        <p>Filter by room type: </p>
        <!-- Filter Dropdown -->
        <div class="filter-container text-center">
            <select id="roomTypeFilter" class="form-select">
                <option selected>Filter by Room Type: </option>               
            </select>
        </div>
        <div class="table-container mb-5">
            <table class="table table-bordered room-table">
                <thead>
                    <tr>
                        <th>Room Name</th>
                        <th>Room Type</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studyRoomContainer">
                    <!-- Dynamic rows will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="studyRoom.js"></script>
    <script>
        // Function to load the navbar into the page
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

        });
    </script>
</body>

</html>
