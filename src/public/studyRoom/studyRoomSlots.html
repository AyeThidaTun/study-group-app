<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Room Availability</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.0/main.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .calendarContainer {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            width: 100%;
        }

        #calendar {
            width: 100%;
            max-width: 700px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #ffffff;
        }

        /* Styling for the rooms container (if used for dynamic room slots) */
        #roomsContainer {
            margin-top: 10px;
            width: 80%;
            max-width: 900px;
            border-radius: 8px;
            padding-top: 15px;
        }

        #calendar a {
            text-decoration: none !important;
            color: black;
            cursor: pointer;
        }

        .room-card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .room-card {
            margin-bottom: 30px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
        }

        .modal-dialog {
            margin: auto;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
        }

        #calendar .fc-toolbar-title {
            padding: 10px 20px;
            font-size: 25px;
            border-radius: 8px;
            display: inline-block;
            color: #333;
        }

        #calendar .fc-button {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            background-color: #e1bd76;
            color: white;
            border: none;
            transition: background-color 0.3s ease;
            margin: 10px;
        }

        #calendar .fc-button:hover {
            background-color: #a27835;
        }


        .disabled-slot {
            color: grey;
            cursor: not-allowed;
            font-style: italic;
        }

        .fc-day-past {
            background-color: #f0f0f0;
            cursor: not-allowed;
            color: #a9a9a9;
        }
    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <h2 class="mt-5 mb-3 text-center">Study Room Availability Calendar</h2>
    <p class="text-center mb-3"> You can click the date to see the available slots.</p>
    <div class="container d-flex justify-content-center">
        <button class="btn btn-custom mt-3 mb-5" onclick="goBack()"><i class="bi bi-arrow-left"></i> Back to Study
            rooms</button>
    </div>
    <!-- Calendar to select the date -->
    <div class="container calendarContainer">
        <div id="calendar"></div>
    </div>

    <!-- Modal -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Booking Details</h3>
                <button class="close-btn" onclick="closeModal()">x</button>
            </div>
            <div id="roomsContainer">
                <!-- Available rooms and slots will be dynamically populated here -->
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.0/main.min.js"></script>
    <script src="studyRoomSlots.js"></script>
    <script>
        // Function to load the navbar into the page
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

        });

        // Back button functionality
        function goBack() {
            window.history.back();
        }

        function closeModal() {
            const modal = document.getElementById('roomModal');
            modal.style.display = 'none';
        }

        document.getElementById('roomModal').addEventListener('click', function (event) {
            const modalContent = document.querySelector('.modal-content');
            if (!modalContent.contains(event.target)) {
                closeModal(); // Close the modal if clicked outside the modal content
            }
        });

    </script>
</body>

</html>
