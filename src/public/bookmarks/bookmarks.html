<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar will be injected here -->
  <div id="navbar-container"></div>

  <div class="container mt-4">
    <h1 class="text-center">My Bookmarks</h1>

    <!-- Form to create a new bookmark -->
    <h2>Create New Bookmark</h2>
    <form id="createBookmarkForm" class="p-3 border rounded">
      <div class="mb-3">
        <label for="resourceId" class="form-label">Resource ID:</label>
        <input type="number" id="resourceId" name="resourceId" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">Add Bookmark</button>
    </form>

    <!-- Table to display bookmarks -->
    <h2 class="mt-5">All Bookmarks</h2>
    <div class="table-responsive">
      <table id="bookmarksTable" class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>Bookmark ID</th>
            <th>Resource Title</th>
            <th>Resource Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    // Function to load the navbar
    window.addEventListener('DOMContentLoaded', function () {
      // Load the navbar
      fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });


      // Fetch bookmarks when the page loads
      fetchBookmarks();
    });

    // Fetch and display all bookmarks for the user
    function fetchBookmarks() {
      const token = localStorage.getItem("token");

      fetch("http://localhost:3000/bookmarks", {
        method: "GET",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
      .then(response => response.json())
      .then(bookmarks => {
        const bookmarksTable = document.getElementById("bookmarksTable").getElementsByTagName("tbody")[0];
        bookmarksTable.innerHTML = ""; // Clear previous entries

        bookmarks.forEach(bookmark => {
          const row = bookmarksTable.insertRow();
          row.innerHTML = `
            <td>${bookmark.id}</td>
            <td>${bookmark.resource.title}</td>
            <td>${bookmark.resource.description || 'No Description'}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteBookmark(${bookmark.id})">Delete</button>
            </td>
          `;
        });
      })
      .catch(error => console.error("Error fetching bookmarks:", error));
    }

    // Create a new bookmark
    document.getElementById("createBookmarkForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const resourceId = document.getElementById("resourceId").value;
      const token = localStorage.getItem("token");

      fetch("http://localhost:3000/bookmarks", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ resourceId })
      })
      .then(response => response.json())
      .then(bookmark => {
        alert("Bookmark added successfully");

        // Clear form fields
        document.getElementById("resourceId").value = "";

        // Refresh bookmarks list
        fetchBookmarks();
      })
      .catch(error => console.error("Error creating bookmark:", error));
    });

    // Delete a bookmark
    function deleteBookmark(bookmarkId) {
      const token = localStorage.getItem("token");

      fetch(`http://localhost:3000/bookmarks/${bookmarkId}`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
      .then(response => {
        if (response.ok) {
          alert("Bookmark deleted successfully");
          fetchBookmarks();  // Refresh the list
        } else {
          return response.json().then(data => alert(data.error));
        }
      })
      .catch(error => console.error("Error deleting bookmark:", error));
    }
  </script>
</body>
</html>
