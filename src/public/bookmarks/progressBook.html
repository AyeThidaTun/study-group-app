  async function fetchResourceContent() {
    try {
      const response = await fetch(`/resources/Res/${resourceId}`, {
        headers: { Authorization: `Bearer ${localStorage.getItem('token')}` },
      });

      if (!response.ok) throw new Error('Failed to load resource content.');

      const resource = await response.json();
      document.getElementById('resource-title').textContent = resource.title || 'Untitled Resource';

      // Use resource description if available, otherwise fallback to hardcoded content
      document.getElementById('resource-content').innerHTML = hardcodedContent;
    } catch (error) {
      console.error(error);
      document.getElementById('resource-content').innerHTML = hardcodedContent;
    }
  }

      function calculateProgress() {

    const content = document.querySelector('.content-container');

    const scrollTop = window.scrollY || document.documentElement.scrollTop;

    const scrollHeight = content.scrollHeight - window.innerHeight;

    const progress = Math.min((scrollTop / scrollHeight) * 100, 100);

    return Math.round(progress);

    }

  async function updateProgress(progress) {
    try {
      const response = await fetch(`/bookmarks/${bookmarkId}/progress`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${localStorage.getItem('token')}`,
        },
        body: JSON.stringify({ progress }),
      });

      if (!response.ok) throw new Error('Failed to update progress.');

      console.log(`Progress updated: ${progress}%`);
    } catch (error) {
      console.error('Failed to update progress:', error);
    }
  }

  async function updateBookmarkStatus(id, status) {

  try {

  const response = await fetch(`/bookmarks/${id}/status`, {

  method: 'PATCH',

  headers: {

  'Content-Type': 'application/json',

  Authorization: `Bearer ${localStorage.getItem('token')}`,

  },

  body: JSON.stringify({ status }),

  });

  if (!response.ok) throw new Error('Failed to update bookmark status.');

  console.log(`Bookmark status updated to: ${status}`);

  } catch (error) {

  console.error('Error updating bookmark status:', error);

  }

  }

  window.addEventListener('DOMContentLoaded', () => {

  const params = new URLSearchParams(window.location.search);

  const progress = parseFloat(params.get('progress')) || 0;

  // If progress exists, scroll to the corresponding position

  if (progress > 0) {

  const content = document.querySelector('.content-container');

  const targetScroll = (progress / 100) * (content.scrollHeight - window.innerHeight);

  window.scrollTo(0, targetScroll);

  }

  });

  window.addEventListener('scroll', () => {
    const progress = calculateProgress();
    const progressBar = document.getElementById('progress-bar');
    progressBar.style.width = `${progress}%`;

    // Update progress on the server every 10% progress
    if (progress % 10 === 0) {
      updateProgress(progress);
    }

    // Update status to "reading" if progress is greater than 0% and status hasn't been updated yet
    if (progress > 0 && !statusUpdated) {
      updateBookmarkStatus(bookmarkId, 'READING');
      statusUpdated = true; // Prevent further updates to the status
    }
  });

     
    // "Go Back" arrow functionality

    goBackArrow.addEventListener('click', async () => {

    const progressBar = document.getElementById('progress-bar');

    const progress = parseInt(progressBar.style.width, 10); // Current progress as an integer

    if (progress === 100) {

    console.log('Marking as Finished since progress is 100%.');

    await updateBookmarkStatus(bookmarkId, 'FINISHED');

    } else {

    console.log('Progress is less than 100%, no status update needed.');

    }

    // Navigate back to the book or previous page

    window.history.back(); // Adjust navigation logic if needed

    });
