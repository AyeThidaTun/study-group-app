<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="navbar-container"></div>

    <div class="heading container mt-5 text-center">
        <h1>Your Tasks</h1>
    </div>

    <!-- Filter & Sort Section -->
    <section id="filterAndSort" class="container my-5">
        <h2>Filter & Sort Tasks</h2>
        <div class="row g-3">
            <div class="col-md-3">
                <select id="filterCategory" class="form-control">
                    <option value="" selected>All Categories</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="School">School</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="filterStatus" class="form-control">
                    <option value="" selected>All Status</option>
                    <option value="PENDING">Pending</option>
                    <option value="COMPLETED">Completed</option>
                    <option value="ARCHIVED">Archived</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="filterMood" class="form-control">
                    <option value="" selected>All Mood</option>
                    <option value="HAPPY">Happy</option>
                    <option value="STRESSED">Stressed</option>
                    <option value="RELAXED">Relaxed</option>
                    <option value="NEUTRAL">Neutral</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="sortBy" class="form-control">
                    <option value="" selected>Sort By</option>
                    <option value="due-date">Due Date</option>
                    <option value="priority">Priority</option>
                </select>
            </div>
            <div class="col-md-12 text-center mt-3">
                <button id="applyFilters" class="btn btn-outline-success">Apply Filters</button>
            </div>
        </div>
    </section>

    <!-- Task Board Section -->
    <section id="taskBoard" class="container my-5">
        <div class="row">
            <div class="col-md-4 task-column">
                <h3 class="text-warning">Pending</h3>
                <ul id="pendingTasks" class="list-group"></ul>
            </div>
            <div class="col-md-4 task-column">
                <h3 class="text-success">Completed</h3>
                <ul id="completedTasks" class="list-group"></ul>
            </div>
            <div class="col-md-4 task-column">
                <h3 class="text-secondary">Archived</h3>
                <ul id="archivedTasks" class="list-group"></ul>
            </div>
        </div>
    </section>

    <!-- Task Creation Section -->
    <section id="taskCreation" class="container my-5">
        <h2>Create a Task</h2>
        <form id="todoForm" class="row g-3">
            <div class="col-md-6">
                <input type="text" id="title" class="form-control" placeholder="Task Title" required>
            </div>
            <div class="col-md-6">
                <input type="date" id="dueDate" class="form-control" required>
            </div>
            <div class="col-md-6">
                <textarea id="description" class="form-control" placeholder="Task Description"></textarea>
            </div>
            <div class="col-md-3">
                <select id="category" class="form-control">
                    <option value="" disabled selected>Choose a Category</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="School">School</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="priority" class="form-control">
                    <option value="" disabled selected>Select Priority</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="mood" class="form-control">
                    <option value="" disabled selected>Select Mood</option>
                    <option value="HAPPY">Happy</option>
                    <option value="STRESSED">Stressed</option>
                    <option value="RELAXED">Relaxed</option>
                    <option value="NEUTRAL">Neutral</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="recurring" class="form-control">
                    <option value="NONE" selected>None</option>
                    <option value="DAILY">Daily</option>
                    <option value="WEEKLY">Weekly</option>
                    <option value="MONTHLY">Monthly</option>
                </select>
            </div>
            <div class="col-md-12">
                <textarea id="notes" class="form-control" placeholder="Additional Notes (Optional)"></textarea>
            </div>
            <div class="col-md-12 text-center mt-3">
                <button type="submit" class="btn btn-outline-success">Add Task</button>
            </div>
        </form>
    </section>

    <script src="script.js"></script>
    <script>
        fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });
    </script>

</body>

</html>
