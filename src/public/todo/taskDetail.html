<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="taskDetail.css">
</head>
<body>

    <!-- Navbar will be injected here -->
  <div id="navbar-container"></div>

  <div class="container py-5">
      <h1 class="text-center mb-4">Task Details</h1>
    <div id="taskDetails" class="card shadow-lg p-4"></div>

    <div class="text-center mt-4">
      <a href="../todo/index.html" class="btn btn-outline-secondary">Back to To do list</a>
    </div>
  </div>

  <script src="../todo/taskDetails.js"></script>

  <script>
    fetch('../navbar.html')
        .then(response => response.text())
        .then(html => {
            document.getElementById('navbar-container').innerHTML = html;

            // Dark mode initialization code (moved from navbar.js)
            const darkModeToggle = document.getElementById('dark-mode-toggle');
            const navbar = document.querySelector('.navbar');

            if (!darkModeToggle || !navbar) {
                console.error('Dark mode toggle or navbar not found!');
                return;
            }

            // Function to enable/disable dark mode
            function toggleDarkMode(enable) {
                if (enable) {
                    document.body.classList.add('dark-mode');
                    navbar.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                    navbar.classList.remove('dark-mode');
                }
            }

            // Load saved dark mode state
            const darkModeState = localStorage.getItem('darkMode');
            if (darkModeState === 'enabled') {
                toggleDarkMode(true);
            }

            // Toggle dark mode on button click
            darkModeToggle.addEventListener('click', () => {
                const isDarkMode = document.body.classList.contains('dark-mode');
                toggleDarkMode(!isDarkMode);
                localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
            });


        });
</script>
</body>
</html>
