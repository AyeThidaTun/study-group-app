<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggestions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="../main.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>

    <!-- Search and Sort Section -->
    <div class="container my-5">
        <div class="row">
            <!-- Search Bar -->
            <div class="col-md-12 mb-3">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search or Create a Post..." id="search-bar">
                    <button class="btn btn-primary" id="new-post-btn">New Post</button>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Sort & View Section -->
            <div class="col-md-5 text-end">
                <div class="d-flex align-items-center">
                    <label for="sort-view" class="me-2 mb-0">Sort & View</label> <!-- Remove margin-bottom -->
                    <select class="form-select mb-0" id="sort-view"> <!-- Remove margin-bottom -->
                        <option value="createdAt">Date Posted</option>
                        <!-- More sorting options can be added here -->
                    </select>
                    <div class="form-check ms-3 mb-0">
                        <input class="form-check-input" type="radio" name="sort-order" id="asc">
                        <label class="form-check-label" for="asc">ASC</label>
                    </div>
                    <div class="form-check ms-2 mb-0">
                        <input class="form-check-input" type="radio" name="sort-order" id="desc" checked>
                        <label class="form-check-label" for="desc">DESC</label>
                    </div>
                </div>
            </div>

            <!-- Tags Section -->
            <div class="col-md-7 mt-3">
                <div class="d-flex align-items-center">
                    <div class="retrieve-section">
                        <div class="btn-group" role="group" aria-label="Tag Filters">
                            <button type="button" class="btn btn-outline-secondary">UI</button>
                            <button type="button" class="btn btn-outline-secondary">Design</button>
                            <button type="button" class="btn btn-outline-secondary">Feature</button>
                            <button type="button" class="btn btn-outline-secondary">Bug Report</button>
                        </div>
                    </div>                    
                </div>
            </div>
        </div>
    </div>

    <!-- Suggestions Container -->
    <div class="container my-5 py-5" id="suggestions-container">
        <!-- Suggestions will be injected here -->
    </div>

    <!-- Create Post Modal -->
    <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="createPostModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="createPostModalLabel">Create New Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="create-post-form">
                        <div class="mb-3">
                            <label for="post-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="post-title" placeholder="Enter your post title" required>
                        </div>
                        <div class="mb-3">
                            <label for="post-description" class="form-label">Description</label>
                            <textarea class="form-control" id="post-description" rows="4" placeholder="Describe your suggestion" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Select Tags</label>
                            <div class="btn-group w-100" role="group" id="post-tags">
                                <button type="button" class="btn btn-outline-secondary" data-context="modal" data-tag="UI">UI</button>
                                <button type="button" class="btn btn-outline-secondary" data-context="modal" data-tag="Design">Design</button>
                                <button type="button" class="btn btn-outline-secondary" data-context="modal" data-tag="Feature">Feature</button>
                                <button type="button" class="btn btn-outline-secondary" data-context="modal" data-tag="Bug Report">Bug Report</button>
                            </div>
                        </div>
                        <div id="post-error-message" class="text-danger d-none">Please fill out all fields.</div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="submit-post-btn">Submit</button>
                </div>
            </div>
        </div>
    </div>
    

    <!-- General Alert Modal -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered alertModal">
            <div class="modal-content custom-popover">
                <div class="modal-header custom-popover">
                    <h5 class="modal-title" id="alertModalLabel">Notification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body custom-popover" id="alertModalBody">
                    <!-- Alert content will be dynamically inserted here -->
                </div>
                <div class="modal-footer custom-popover">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="../auth.js"></script>
    <script src="retrieve.js"></script>
    <script src="create.js"></script>
    
</body>

</html>
