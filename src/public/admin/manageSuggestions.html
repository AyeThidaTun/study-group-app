<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Suggestions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../main.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>
    <div class="container mt-4">
        <div id="profile-container" class="row g-4 mb-5 pb-5">
            <!-- Profile information will be dynamically injected here -->
        </div>
    </div>

    <!-- Search and Sort Section -->
    <div class="container my-5">
        <div class="row">
            <!-- Search Bar -->
            <div class="col-md-12 mb-3">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search a Post..." id="search-bar">
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Sort & View Section -->
            <div class="col-md-5 text-end">
                <div class="d-flex align-items-center">
                    <label for="sort-view" class="me-2 mb-0">Sort & View</label> <!-- Remove margin-bottom -->
                    <select class="form-select mb-0" id="sort-view"> <!-- Remove margin-bottom -->
                        <option value="createdAt">Date Posted</option>
                        <!-- More sorting options can be added here -->
                    </select>
                    <div class="form-check ms-3 mb-0">
                        <input class="form-check-input" type="radio" name="sort-order" id="asc">
                        <label class="form-check-label" for="asc">ASC</label>
                    </div>
                    <div class="form-check ms-2 mb-0">
                        <input class="form-check-input" type="radio" name="sort-order" id="desc" checked>
                        <label class="form-check-label" for="desc">DESC</label>
                    </div>
                </div>
            </div>

            <!-- Tags Section -->
            <div class="col-md-7 mt-3">
                <div class="d-flex align-items-center">
                    <div class="retrieve-section">
                        <div class="btn-group" role="group" aria-label="Tag Filters">
                            <button type="button" class="btn btn-outline-secondary">UI</button>
                            <button type="button" class="btn btn-outline-secondary">Design</button>
                            <button type="button" class="btn btn-outline-secondary">Feature</button>
                            <button type="button" class="btn btn-outline-secondary">Bug Report</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Suggestions Container -->
    <div class="container my-5 py-5" id="suggestions-container">
        <!-- Suggestions will be injected here -->
    </div>

    <!-- Manage Suggestion Modal -->
    <div class="modal fade" id="manageSuggestionModal" tabindex="-1" aria-labelledby="manageSuggestionModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="manageSuggestionForm">
                    <div class="modal-header">
                        <h5 class="modal-title" id="manageSuggestionModalLabel">Manage Suggestion</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="suggestionIdInput">
                        <div class="mb-3">
                            <label class="form-label">Action</label>
                            <div>
                                <input type="radio" name="action" id="approveRadio" value="APPROVED" class="btn-check">
                                <label class="btn btn-outline-success" for="approveRadio">Approve</label>
                                <input type="radio" name="action" id="rejectRadio" value="REJECTED" class="btn-check">
                                <label class="btn btn-outline-danger" for="rejectRadio">Reject</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="reasonInput" class="form-label">Reason</label>
                            <textarea id="reasonInput" class="form-control" rows="3" placeholder="Enter reason"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <!-- General Alert Modal -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered alertModal">
            <div class="modal-content custom-popover">
                <div class="modal-header custom-popover">
                    <h5 class="modal-title" id="alertModalLabel">Notification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body custom-popover" id="alertModalBody">
                    <!-- Alert content will be dynamically inserted here -->
                </div>
                <div class="modal-footer custom-popover">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="../adminAuth.js"></script>
    <script src="manageSuggestions.js"></script>
</body>

</html>
