<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fefae0;
        }

        .welcome-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .welcome-box {
            border-radius: 15px;
            padding: 2rem;
            background-color: #FAEDCD;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .btn-login {
            background-color: #d4a373;
            border-color: #d4a373;
            color: #000;
        }

        .btn-login:hover {
            background-color: #b6c498;
            border-color: #b6c498;
            color: white;
        }

        .btn-register {
            background-color: #E9EDC9;
            border-color: #E9EDC9;
        }

        .btn-register:hover {
            background-color: #b6c498;
            border-color: #b6c498;
            color: white;
        }

        .btn-custom {
            max-width: 300px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container welcome-container">
        <div class="welcome-box">
            <h2>Welcome Back</h2>
            <p>Log in or register with your SP Account to use the website</p>
            <div class="row mb-3">
                <div class="col">
                    <button class="btn btn-lg btn-custom btn-login" onclick="window.location.href='login.html'">
                        Log In
                    </button>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <button class="btn btn-lg btn-custom btn-register" onclick="window.location.href='register.html'">
                        Register
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
