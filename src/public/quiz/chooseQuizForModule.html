<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Quiz for Module</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="../main.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>

<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>

    <div class="container-fluid py-3 breadcrumb-container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0" id="breadcrumb">
                <li class="breadcrumb-item"><a href="/quiz/chooseSchoolForQuiz.html">Choose School</a></li>
                <li class="breadcrumb-item"><span id="breadcrumb-school"></span></a></li>
                <li class="breadcrumb-item"><a href="#" id="choose-module-link">Choose Module</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-module" aria-current="page"></li>
            </ol>
        </nav>
    </div>

    <div class="container my-5 py-3">
        <h2 class="text-center mb-4 h1 title col-12">Study Activities</h2>

        <!-- Tab Navigation -->
        <ul class="nav nav-tabs" id="activityTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="quizzes-tab" data-bs-toggle="tab" data-bs-target="#quizzes-content"
                    type="button" role="tab" aria-controls="quizzes-content" aria-selected="true">Quizzes</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="flashcards-tab" data-bs-toggle="tab" data-bs-target="#flashcards-content"
                    type="button" role="tab" aria-controls="flashcards-content" aria-selected="false">Flashcards</button>
            </li>
        </ul>

        <div class="container my-4">
            <h4>Filters</h4>
            <div class="row">
                <!-- Semester Filter -->
                <div class="col-md-3">
                    <h5>Semester</h5>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="semester" value="Semester 1"> Semester 1</label><br>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="semester" value="Semester 2"> Semester 2</label>
                </div>
                <!-- Academic Year Filter -->
                <div class="col-md-3">
                    <h5>Academic Year</h5>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="academicYear" value="AY2023/2024"> AY2023/2024</label><br>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="academicYear" value="AY2024/2025"> AY2024/2025</label>
                </div>
                <!-- Status Filter -->
                <div class="col-md-3">
                    <h5>Status</h5>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="status" value="Not Attempted"> Not Attempted</label><br>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="status" value="In Progress"> In Progress</label><br>
                    <label><input type="checkbox" class="filter-checkbox" data-filter="status" value="Completed"> Completed / Mastered</label>
                </div>
            </div>
        </div>
        
        

        <!-- Tab Content -->
        <div class="tab-content" id="activityTabsContent">
            <!-- Quizzes Tab Content -->
            <div class="tab-pane fade show active" id="quizzes-content" role="tabpanel" aria-labelledby="quizzes-tab">
                <div class="row justify-content-center my-4" id="quizzes">
                    <!-- Cards for each quiz will be inserted here dynamically -->
                </div>
            </div>

            <!-- Flashcards Tab Content -->
            <div class="tab-pane fade" id="flashcards-content" role="tabpanel" aria-labelledby="flashcards-tab">
                <div class="row justify-content-center my-4" id="flashcards">
                    <!-- Flashcard content will be dynamically loaded -->
                    <p class="text-center">Flashcards for this module will appear here.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- General Alert Modal -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered alertModal">
            <div class="modal-content custom-popover">
                <div class="modal-header custom-popover">
                    <h5 class="modal-title" id="alertModalLabel">Notification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body custom-popover" id="alertModalBody">
                    <!-- Alert content will be dynamically inserted here -->
                </div>
                <div class="modal-footer custom-popover">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="attemptsModal" tabindex="-1" aria-labelledby="attemptsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="attemptsModalLabel">Previous Attempts</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="attempts-modal-body">
                    <!-- Attempts will be dynamically inserted here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="../auth.js"></script>
    <script src="chooseQuizForModule.js"></script>
    <script src="chooseFlashcardForModule.js"></script> 
</body>

</html>
