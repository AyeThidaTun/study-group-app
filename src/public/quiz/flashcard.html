<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="../main.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Back to Decks Button -->
    <div class="text-left my-3 mx-3">
        <button id="go-back-btn" class="btn" style="background-color: #deb183 !important;">Back to Decks</button>
    </div>


    <div class="container my-5">
        <h2 class="text-center mb-4 h1 title col-12">Flashcards</h2>

        <!-- Flashcard Display -->
        <div class="d-flex justify-content-center">
            <div id="flashcard" class="card col-8 text-center p-5">
                <h4 id="flashcard-content" class="mb-0">Click to flip</h4>
            </div>
        </div>

        <!-- Flashcard Counter -->
        <div class="text-center my-3">
            <span id="flashcard-counter">0 / 0</span>
        </div>

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-between align-items-center mt-4">
            <button id="prev-btn" class="btn btn-secondary">&larr; Previous</button>
            <button id="next-btn" class="btn btn-secondary">Next &rarr;</button>
        </div>
    </div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
        <script src="../auth.js"></script>
        <script src="flashcard.js"></script>
</body>

</html>
