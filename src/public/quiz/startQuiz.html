<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="../main.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-container"></div>

    <div class="container my-5">
        <h2 class="text-center mb-4 h1 title col-12" id="quiz-title">Quiz Title</h2>

        <!-- Questions Container -->
        <form id="quiz-form">
            <div id="questions-container"></div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary">Submit Quiz</button>
            </div>
        </form>
    </div>

    <!-- General Alert Modal -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-labelledby="alertModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered alertModal">
            <div class="modal-content custom-popover">
                <div class="modal-header custom-popover">
                    <h5 class="modal-title" id="alertModalLabel">Notification</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body custom-popover" id="alertModalBody">
                    <!-- Alert content will be dynamically inserted here -->
                </div>
                <div class="modal-footer custom-popover">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationModalLabel">Confirm Submission</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    You haven't answered all questions. Are you sure you want to submit the quiz?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelSubmitButton" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmSubmitButton">Confirm Submission</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Answer Confirmation Modal -->
    <div class="modal fade" id="fullAnswerModal" tabindex="-1" aria-labelledby="fullAnswerModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="fullAnswerModalLabel">Confirm Submission</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    You have answered all questions. Are you sure you want to submit the quiz?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmFullSubmitButton">Confirm
                        Submission</button>
                </div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="../auth.js"></script>
    <script src="startQuiz.js"></script>
</body>

</html>
