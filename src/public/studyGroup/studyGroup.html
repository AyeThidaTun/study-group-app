<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1,
        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .tab-content {
            margin-top: 20px;
        }

        .card {
            margin-bottom: 20px;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
        }

        .nav-tabs .nav-link.active {
            background-color: #deb183 !important;
            color: black !important;
        }

        .nav-tabs .nav-link {
            color: #333 !important;
        }

        .form-control {
            max-width: 500px;
            /* Set a fixed maximum width */
        }
    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <div class="container">
        <h1>Study Groups</h1>

        <!-- Tabs -->
        <ul class="nav nav-tabs" id="studyGroupTabs" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="all-groups-tab" data-bs-toggle="tab" data-bs-target="#all-groups"
                    type="button" role="tab">All Groups</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="joined-groups-tab" data-bs-toggle="tab" data-bs-target="#joined-groups"
                    type="button" role="tab">My Groups</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="create-tab" data-bs-toggle="tab" data-bs-target="#create" type="button"
                    role="tab" aria-controls="create" aria-selected="false">Create Group</button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- View Groups Tab -->
            <div class="tab-pane fade show active" id="all-groups" role="tabpanel" aria-labelledby="all-groups-tab">
                <div id="studyGroupsContainer" class="row g-3 mt-4 m-3 mb-5">
                    <!-- Cards will be dynamically populated here -->
                </div>
            </div>
            <!-- Joined Groups Tab -->
            <div class="tab-pane fade" id="joined-groups" role="tabpanel" aria-labelledby="joined-groups-tab">
                <div id="joinedGroupsContainer" class="row g-3 mt-4 m-3 mb-5">
                    <!-- Joined groups will be dynamically populated here -->
                </div>
            </div>
            <!-- Create Group Tab -->
            <div class="tab-pane fade" id="create" role="tabpanel" aria-labelledby="create-tab">
                <div class="container align-items-center">
                    <form id="studyGroupForm" class="mt-4 m-5">
                        <div class="form-group">
                            <label for="groupName" class="form-label">Group Name:</label>
                            <input type="text" id="groupName" name="groupName" class="form-control"
                                placeholder="Enter group name" required>
                        </div>
                        <div class="form-group">
                            <label for="groupDescription" class="form-label">Description:</label>
                            <textarea id="groupDescription" name="groupDescription" class="form-control" rows="3"
                                placeholder="Enter group description" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom mt-3 createGroupBtn">Create New Group</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="studyGroup.js"></script>
    <script>
        // Function to load the navbar into the page
        document.addEventListener('DOMContentLoaded', () => {
            fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

        });
    </script>
</body>

</html>
