<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Groups</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        h1,
        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .tab-content {
            margin-top: 20px;
        }

        .card {
            margin-bottom: 20px;
            width: 400px;
        }

        .btn-custom {
            background-color: #deb183 !important;
            color: black;
            border: none;
        }

        a {
            color: black;
        }
    </style>
</head>

<body>
    <div id="navbar-container" class="mb-3"></div>
    <div class="container">
        <h2 class="m-5">Study Group Details</h2>
        <div class="details-container justify-content-center d-flex">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 id="groupName" class="mb-3"></h5>
                    <br>
                    <div id="groupStatusContainer">
                        <h5 id="groupStatus">Your status</h5>
                    </div>
                    <br>
                    <p id="groupDescription">Description: </p>
                    <ul id="groupMembers" class="member-list">
                        <!-- Member names will be dynamically added here -->
                    </ul>
                    <p id="creatorText"></p> <!-- if you are creator of the study group, you can see here -->
                </div>                
                <a class="text-decoration-underline text-dark text-center m-3" href="../studyGroup/studyGroup.html">Back
                    to Groups</a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="studyGroupDetails.js"></script>
        <script>
            // Function to load the navbar into the page
            document.addEventListener('DOMContentLoaded', () => {
                fetch('../navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-container').innerHTML = html;

                // Dark mode initialization code (moved from navbar.js)
                const darkModeToggle = document.getElementById('dark-mode-toggle');
                const navbar = document.querySelector('.navbar');

                if (!darkModeToggle || !navbar) {
                    console.error('Dark mode toggle or navbar not found!');
                    return;
                }

                // Function to enable/disable dark mode
                function toggleDarkMode(enable) {
                    if (enable) {
                        document.body.classList.add('dark-mode');
                        navbar.classList.add('dark-mode');
                    } else {
                        document.body.classList.remove('dark-mode');
                        navbar.classList.remove('dark-mode');
                    }
                }

                // Load saved dark mode state
                const darkModeState = localStorage.getItem('darkMode');
                if (darkModeState === 'enabled') {
                    toggleDarkMode(true);
                }

                // Toggle dark mode on button click
                darkModeToggle.addEventListener('click', () => {
                    const isDarkMode = document.body.classList.contains('dark-mode');
                    toggleDarkMode(!isDarkMode);
                    localStorage.setItem('darkMode', isDarkMode ? 'disabled' : 'enabled');
                });


            });

            });

        </script>
</body>

</html>
