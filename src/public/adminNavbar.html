<head>
    <base href="/" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        .navbar {
            padding-top: 1.25rem;
            padding-bottom: 1.25rem;
            padding-left: 2rem;
            padding-right: 2rem;
        }

        .logout-btn {
            background-color: #d4a373;
            border-radius: 5px;
            color: white;
            padding: 0.5rem 1rem;
            text-align: center;
            font-weight: bold;
        }

        .logout-btn:hover {
            background-color: #faedcd;
            color: black;
        }

        .navbar-nav .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* Dropdown menu styling */
        .dropdown-menu {
            background-color: #fefae0;
            border-radius: 10px;
            overflow: hidden;
            padding: 0;
        }

        .dropdown-menu::after {
            content: "";
            display: block;
            height: 8px;
            background-color: #ccd5ae;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .dropdown-item {
            color: black;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .dropdown-item:hover {
            background-color: #e9edc9;
            color: black;
        }

        /* Increase space between navbar items */
        .navbar-nav .nav-item {
            margin-right: 1.5rem;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: #e9edc9;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Admin Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <!-- Admin Managing Suggestions -->
                    <li class="nav-item">
                        <a class="nav-link active" href="admin/manageSuggestions.html">Manage Suggestions</a>
                    </li>
                    <!-- Admin Managing SP Shop -->
                    <li class="nav-item">
                        <a class="nav-link active" href="admin/manageShop.html">Manage SP Shop</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/profile/profile.html">Profile</a>
                    </li>
                    <!-- Logout button -->
                    <li class="nav-item">
                        <a class="nav-link logout-btn" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
